<!DOCTYPE html>
<html>
<head>
    <title>My Blog</title>
</head>
<body>
    <h1>My Blog</h1>

    {% for post in posts %}
        <article>
            <h2>{{ post.title }}</h2>
            <p>{{ post.text|linebreaksbr }}</p>
            <p>Published: {{ post.published_date }}</p>
        </article>
    {% empty %}
        <p>No published posts yet.</p>
    {% endfor %}
</body>
</html>
